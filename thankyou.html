<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо за заявку!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Montserrat', -apple-system, sans-serif;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f0f 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #3FA703, #2d7a02);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 36px;
}
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 12px;
}
p {
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255,255,255,0.8);
  margin-bottom: 32px;
}
.btn {
  display: inline-block;
  padding: 14px 36px;
  background: #3FA703;
  color: #fff;
  text-decoration: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  transition: background .2s;
}
.btn:hover { background: #4cc005; }
@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  h1 { font-size: 22px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#10003;</div>
  <h1>Спасибо за заявку!</h1>
  <p>Ваша заявка успешно отправлена.<br>Ожидайте, с вами свяжется оператор в ближайшее время.</p>
  <a href="/" class="btn">На главную</a>
</div>
</body>
</html>
